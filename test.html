<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VNStock Debug v11</title>
<style>
body{background:#070c12;color:#e0eaf4;font-family:monospace;padding:14px;font-size:12px}
h2{color:#00c8ff;margin-bottom:10px;font-size:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
button{background:#0d1720;color:#e0eaf4;border:1px solid #1a2d42;border-radius:8px;
  padding:10px 8px;font-size:11px;font-weight:700;cursor:pointer;text-align:left;line-height:1.3}
button:active{background:#1a2d42}
button.ok{border-color:#00e096;color:#00e096}
button.err{border-color:#ff4560;color:#ff4560}
button.run{background:#0077aa;color:#fff;border-color:#0077aa;grid-column:1/-1;text-align:center;font-size:13px}
button.run:active{opacity:.8}
#log{background:#0d1720;border:1px solid #1a2d42;border-radius:8px;padding:10px;
  white-space:pre-wrap;word-break:break-all;height:55vh;overflow-y:auto;font-size:11px;line-height:1.6}
.ok{color:#00e096}.err{color:#ff4560}.info{color:#60a5fa}.warn{color:#f0b429}
.sep{color:#3d5a78}
</style>
</head>
<body>
<h2>🔧 VNStock Debug — Cloudflare Proxy Test</h2>
<div class="grid">
  <button id="b1" onclick="t('proxy')">🌐 1. Test Proxy<br><span style="opacity:.6;font-weight:400">workers.dev ping</span></button>
  <button id="b2" onclick="t('tcbs')">📊 2. TCBS qua Proxy<br><span style="opacity:.6;font-weight:400">ACB 5 phiên</span></button>
  <button id="b3" onclick="t('ssi')">📊 3. SSI qua Proxy<br><span style="opacity:.6;font-weight:400">ACB historical</span></button>
  <button id="b4" onclick="t('dnse')">📊 4. DNSE qua Proxy<br><span style="opacity:.6;font-weight:400">ACB OHLC</span></button>
  <button id="b5" onclick="t('vci')">📊 5. VCI qua Proxy<br><span style="opacity:.6;font-weight:400">ACB kline</span></button>
  <button id="b6" onclick="t('kbs')">📊 6. KBS qua Proxy<br><span style="opacity:.6;font-weight:400">ACB history</span></button>
  <button class="run" onclick="runAll()">▶▶ CHẠY TẤT CẢ 6 TEST</button>
</div>
<div id="log">Bấm từng nút hoặc CHẠY TẤT CẢ...
</div>

<script>
const PROXY = 'https://vnstock.monosake02.workers.dev/?url=';
const el = document.getElementById('log');

function log(msg, cls='') {
  const s = document.createElement('span');
  if(cls) s.className = cls;
  s.textContent = msg + '\n';
  el.appendChild(s);
  el.scrollTop = el.scrollHeight;
}
function sep(t) { log(''); log('── ' + t + ' ──', 'info'); }

function setBtn(id, state) {
  const b = document.getElementById('b'+id);
  if(!b) return;
  b.classList.remove('ok','err');
  if(state==='ok') b.classList.add('ok');
  if(state==='err') b.classList.add('err');
}

async function proxied(url) {
  const proxyUrl = PROXY + encodeURIComponent(url);
  log('URL: ' + proxyUrl.slice(0,80)+'...', 'sep');
  const r = await fetch(proxyUrl);
  log('HTTP: ' + r.status + ' ' + r.statusText, r.ok?'ok':'err');
  if(!r.ok) throw new Error('HTTP ' + r.status);
  const txt = await r.text();
  log('Response size: ' + txt.length + ' bytes', 'ok');
  log('Preview: ' + txt.slice(0,150), 'ok');
  return JSON.parse(txt);
}

const TESTS = {
  proxy: async () => {
    sep('1. Cloudflare Worker Proxy — Ping');
    log('Worker URL: https://vnstock.monosake02.workers.dev/');
    const r = await fetch('https://vnstock.monosake02.workers.dev/');
    log('HTTP: ' + r.status, r.ok||r.status===400?'ok':'err');
    const txt = await r.text();
    log('Response: ' + txt.slice(0,100), 'ok');
    log('✅ Proxy hoạt động!', 'ok');
  },

  tcbs: async () => {
    sep('2. TCBS → ACB (5 phiên)');
    const to = Math.floor(Date.now()/1000) + 86400;
    const d = await proxied(`https://apipubaws.tcbs.com.vn/stock-insight/v1/stock/bars-long-term?ticker=ACB&type=stock&resolution=D&to=${to}&countBack=5`);
    const bars = d?.data || [];
    log('Số phiên: ' + bars.length, bars.length>0?'ok':'err');
    if(bars.length>0) {
      const last = bars[bars.length-1];
      log('Giá đóng cửa mới nhất: ' + (last.close*1000).toLocaleString('vi-VN') + ' VNĐ', 'ok');
      log('Ngày: ' + new Date(last.tradingDate||last.date||last.t*1000).toLocaleDateString('vi-VN'), 'ok');
    }
    log('✅ TCBS PASS', 'ok');
  },

  ssi: async () => {
    sep('3. SSI iBoard → ACB (25 phiên)');
    const d = await proxied('https://iboard-query.ssi.com.vn/v2/stock/historical-price/ACB/1D/25/1');
    const bars = d?.data || d?.items || [];
    log('Số phiên: ' + bars.length, bars.length>0?'ok':'err');
    if(bars.length>0) {
      const last = bars[bars.length-1];
      const price = last.c || last.close;
      log('Giá đóng cửa mới nhất: ' + (price*1000).toLocaleString('vi-VN') + ' VNĐ', 'ok');
    }
    log('✅ SSI PASS', 'ok');
  },

  dnse: async () => {
    sep('4. DNSE Entrade → ACB');
    const to = Math.floor(Date.now()/1000) + 86400;
    const fr = to - 35*86400;
    const d = await proxied(`https://services.entrade.com.vn/chart-api/v2/ohlcs/stock?from=${fr}&to=${to}&symbol=ACB&resolution=D`);
    const c = d.c || [];
    log('Số phiên: ' + c.length, c.length>0?'ok':'err');
    if(c.length>0) {
      log('Giá đóng cửa mới nhất: ' + (c[c.length-1]*1000).toLocaleString('vi-VN') + ' VNĐ', 'ok');
    }
    log('✅ DNSE PASS', 'ok');
  },

  vci: async () => {
    sep('5. VCI API → ACB');
    const to = new Date(Date.now()+86400000).toISOString().split('T')[0];
    const fr = new Date(Date.now()-40*86400000).toISOString().split('T')[0];
    const d = await proxied(`https://api.vci.com.vn/api/pt/kline?symbol=ACB&resolution=D&from=${fr}&to=${to}`);
    const c = d.c || [];
    log('Số phiên: ' + c.length, c.length>0?'ok':'err');
    if(c.length>0) {
      log('Giá đóng cửa mới nhất: ' + (c[c.length-1]*1000).toLocaleString('vi-VN') + ' VNĐ', 'ok');
    }
    log('✅ VCI PASS', 'ok');
  },

  kbs: async () => {
    sep('6. KBS Securities → ACB');
    const to = new Date(Date.now()+86400000).toISOString().split('T')[0].replace(/-/g,'');
    const fr = new Date(Date.now()-40*86400000).toISOString().split('T')[0].replace(/-/g,'');
    const d = await proxied(`https://api.kbsec.com.vn/api/chart/history?symbol=ACB&resolution=D&from=${fr}&to=${to}`);
    const c = d.c || [];
    log('Số phiên: ' + c.length, c.length>0?'ok':'err');
    if(c.length>0) {
      log('Giá đóng cửa mới nhất: ' + (c[c.length-1]*1000).toLocaleString('vi-VN') + ' VNĐ', 'ok');
    }
    log('✅ KBS PASS', 'ok');
  },
};

const TEST_KEYS = ['proxy','tcbs','ssi','dnse','vci','kbs'];
const BTN_IDS   = [1,2,3,4,5,6];

async function t(name) {
  el.innerHTML = '';
  const idx = TEST_KEYS.indexOf(name);
  log('=== TEST: ' + name.toUpperCase() + ' === ' + new Date().toLocaleTimeString('vi-VN'), 'info');
  try {
    await TESTS[name]();
    if(idx>=0) setBtn(BTN_IDS[idx], 'ok');
  } catch(e) {
    log('❌ LỖI: ' + e.message, 'err');
    if(idx>=0) setBtn(BTN_IDS[idx], 'err');
  }
}

async function runAll() {
  el.innerHTML = '';
  const results = {};
  log('=== CHẠY TẤT CẢ === ' + new Date().toLocaleTimeString('vi-VN'), 'info');
  log('Proxy: https://vnstock.monosake02.workers.dev/?url=', 'sep');

  for(let i=0; i<TEST_KEYS.length; i++) {
    const name = TEST_KEYS[i];
    try {
      await TESTS[name]();
      results[name] = '✅ PASS';
      setBtn(BTN_IDS[i], 'ok');
    } catch(e) {
      results[name] = '❌ ' + e.message;
      setBtn(BTN_IDS[i], 'err');
      log('→ FAIL: ' + e.message, 'err');
    }
  }

  log('', '');
  log('════ KẾT QUẢ TỔNG HỢP ════', 'info');
  let passCount = 0;
  for(const [k,v] of Object.entries(results)) {
    log(k.padEnd(8) + ': ' + v, v.startsWith('✅')?'ok':'err');
    if(v.startsWith('✅')) passCount++;
  }
  log('');
  log(`Tổng: ${passCount}/${TEST_KEYS.length} test PASS`, passCount>0?'ok':'err');
  if(passCount===0) {
    log('');
    log('⚠️ Cloudflare Worker chưa đúng. Kiểm tra lại code Worker!', 'warn');
  } else {
    log('');
    log('🎉 Proxy hoạt động! App chính sẽ lấy được giá thực.', 'ok');
  }
}
</script>

</body>
</html>
