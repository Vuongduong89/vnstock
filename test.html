<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug v12</title>
<style>
body{background:#070c12;color:#e0eaf4;font-family:monospace;padding:14px;font-size:12px}
h2{color:#00c8ff;margin-bottom:10px;font-size:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
button{background:#0d1720;color:#e0eaf4;border:1px solid #1a2d42;border-radius:8px;
  padding:10px 8px;font-size:11px;font-weight:700;cursor:pointer;text-align:left;line-height:1.3}
button:active{background:#1a2d42}
button.ok{border-color:#00e096;color:#00e096}
button.err{border-color:#ff4560;color:#ff4560}
button.run{background:#0077aa;color:#fff;border-color:#0077aa;grid-column:1/-1;text-align:center;font-size:13px}
#log{background:#0d1720;border:1px solid #1a2d42;border-radius:8px;padding:10px;
  white-space:pre-wrap;word-break:break-all;height:55vh;overflow-y:auto;font-size:11px;line-height:1.6}
.ok{color:#00e096}.err{color:#ff4560}.info{color:#60a5fa}.warn{color:#f0b429}.sep{color:#3d5a78}
</style>
</head>
<body>
<h2>🔧 Debug v12 — Fixed Endpoints</h2>
<div class="grid">
  <button id="b1" onclick="t('dnse')">✅ 1. DNSE Entrade<br><span style="opacity:.6;font-weight:400">ACB — đã PASS</span></button>
  <button id="b2" onclick="t('tcbs2')">🔧 2. TCBS v2<br><span style="opacity:.6;font-weight:400">endpoint /v2/</span></button>
  <button id="b3" onclick="t('tcbs1')">🔧 3. TCBS v1<br><span style="opacity:.6;font-weight:400">endpoint /v1/</span></button>
  <button id="b4" onclick="t('ssi')">🔧 4. SSI iBoard<br><span style="opacity:.6;font-weight:400">historical-price</span></button>
  <button id="b5" onclick="t('vnd')">🆕 5. VNDirect API<br><span style="opacity:.6;font-weight:400">finfo-api.vndirect.com.vn</span></button>
  <button id="b6" onclick="t('fireant')">🆕 6. FireAnt API<br><span style="opacity:.6;font-weight:400">restv2.fireant.vn</span></button>
  <button class="run" onclick="runAll()">▶▶ CHẠY TẤT CẢ 6 TEST</button>
</div>
<div id="log">Bấm CHẠY TẤT CẢ...
</div>

<script>
const PROXY = 'https://vnstock.monosake02.workers.dev/?url=';
const el = document.getElementById('log');
function log(msg, cls='') {
  const s = document.createElement('span');
  if(cls) s.className = cls;
  s.textContent = msg + '\n';
  el.appendChild(s); el.scrollTop = el.scrollHeight;
}
function setBtn(id, state) {
  const b = document.getElementById('b'+id);
  if(!b) return;
  b.classList.remove('ok','err');
  if(state) b.classList.add(state);
}

async function proxied(url) {
  const r = await fetch(PROXY + encodeURIComponent(url));
  log('HTTP: ' + r.status, r.ok?'ok':'err');
  if(!r.ok) throw new Error('HTTP ' + r.status);
  const txt = await r.text();
  log('Size: ' + txt.length + ' bytes | Preview: ' + txt.slice(0,120), 'sep');
  return JSON.parse(txt);
}

const TESTS = {
  dnse: async () => {
    const to = Math.floor(Date.now()/1000)+86400, fr=to-60*86400;
    const d = await proxied(`https://services.entrade.com.vn/chart-api/v2/ohlcs/stock?from=${fr}&to=${to}&symbol=ACB&resolution=D`);
    const c = (d.c||[]).filter(x=>x&&x>0);
    log('Phiên hợp lệ: '+c.length, c.length>1?'ok':'err');
    if(c.length>1) log('Giá gần nhất: '+(c[c.length-1]*1000).toLocaleString('vi-VN')+'đ', 'ok');
  },
  tcbs2: async () => {
    const to = Math.floor(Date.now()/1000)+86400;
    const d = await proxied(`https://apipubaws.tcbs.com.vn/stock-insight/v2/stock/bars-long-term?ticker=ACB&type=stock&resolution=D&to=${to}&countBack=5`);
    const bars = d?.data||d?.bars||[];
    log('Số bars: '+bars.length, bars.length>0?'ok':'err');
    if(bars.length>0) log('Giá: '+(bars[bars.length-1].close*1000).toLocaleString('vi-VN')+'đ','ok');
  },
  tcbs1: async () => {
    const to = Math.floor(Date.now()/1000)+86400;
    const d = await proxied(`https://apipubaws.tcbs.com.vn/stock-insight/v1/stock/bars-long-term?ticker=ACB&type=stock&resolution=D&to=${to}&countBack=5`);
    const bars = d?.data||[];
    log('Số bars: '+bars.length, bars.length>0?'ok':'err');
    if(bars.length>0) log('Giá: '+(bars[bars.length-1].close*1000).toLocaleString('vi-VN')+'đ','ok');
  },
  ssi: async () => {
    const d = await proxied('https://iboard-query.ssi.com.vn/v2/stock/historical-price/ACB/1D/60/1');
    const bars = d?.data||d?.items||d?.priceList||[];
    log('Số bars: '+bars.length, bars.length>0?'ok':'err');
    if(bars.length>0) {
      const last = bars[bars.length-1];
      log('Keys: '+Object.keys(last).join(', '), 'sep');
      const price = last.c||last.close||last.closePrice;
      log('Giá: '+(price*1000).toLocaleString('vi-VN')+'đ','ok');
    }
  },
  vnd: async () => {
    const toDate = new Date(Date.now()+86400000).toISOString().split('T')[0];
    const frDate = new Date(Date.now()-30*86400000).toISOString().split('T')[0];
    const d = await proxied(`https://finfo-api.vndirect.com.vn/v4/stock-prices?code=ACB&fromDate=${frDate}&toDate=${toDate}&sort=date&size=5`);
    const items = d?.data||[];
    log('Số phiên: '+items.length, items.length>0?'ok':'err');
    if(items.length>0) {
      const last = items[items.length-1];
      log('Keys: '+Object.keys(last).join(', '),'sep');
      log('Giá: '+(last.close||last.adClose||'?').toLocaleString('vi-VN')+'đ','ok');
    }
  },
  fireant: async () => {
    const toDate = new Date(Date.now()+86400000).toISOString().split('T')[0];
    const frDate = new Date(Date.now()-10*86400000).toISOString().split('T')[0];
    const d = await proxied(`https://restv2.fireant.vn/symbols/ACB/historical-quotes?startDate=${frDate}&endDate=${toDate}&offset=0&limit=5`);
    const arr = Array.isArray(d)?d:(d?.data||[]);
    log('Số phiên: '+arr.length, arr.length>0?'ok':'err');
    if(arr.length>0) {
      log('Keys: '+Object.keys(arr[0]).join(', '),'sep');
      log('Giá: '+(arr[0].priceClose||'?').toLocaleString('vi-VN')+'đ','ok');
    }
  },
};

const KEYS=[['dnse',1],['tcbs2',2],['tcbs1',3],['ssi',4],['vnd',5],['fireant',6]];

async function t(name) {
  el.innerHTML='';
  const pair = KEYS.find(k=>k[0]===name);
  log('=== '+name.toUpperCase()+' === '+new Date().toLocaleTimeString('vi-VN'),'info');
  try{
    await TESTS[name]();
    log('✅ PASS','ok');
    if(pair) setBtn(pair[1],'ok');
  }catch(e){
    log('❌ '+e.message,'err');
    if(pair) setBtn(pair[1],'err');
  }
}

async function runAll() {
  el.innerHTML='';
  log('=== CHẠY TẤT CẢ === '+new Date().toLocaleTimeString('vi-VN'),'info');
  const results={};
  for(const [name,id] of KEYS){
    log('\n── '+name+' ──','info');
    try{
      await TESTS[name]();
      results[name]='✅ PASS'; setBtn(id,'ok');
      log('→ PASS','ok');
    }catch(e){
      results[name]='❌ '+e.message; setBtn(id,'err');
      log('→ FAIL: '+e.message,'err');
    }
  }
  log('\n════ KẾT QUẢ ════','info');
  let pass=0;
  for(const [k,v] of Object.entries(results)){
    log(k.padEnd(10)+': '+v, v.startsWith('✅')?'ok':'err');
    if(v.startsWith('✅')) pass++;
  }
  log('\nPASS: '+pass+'/'+KEYS.length, pass>0?'ok':'err');
  if(pass>0) log('\n🎉 '+pass+' nguồn hoạt động! App chính sẽ có giá thực.','ok');
  else log('\n⚠️ Kiểm tra lại Worker code!','warn');
}
</script>

</body>
</html>
