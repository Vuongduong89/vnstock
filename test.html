<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug v13 — CafeF</title>
<style>
body{background:#070c12;color:#e0eaf4;font-family:monospace;padding:12px;font-size:12px}
h2{color:#00c8ff;margin-bottom:4px;font-size:14px}
.sub{color:#3d5a78;font-size:10px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
button{background:#0d1720;color:#e0eaf4;border:1px solid #1a2d42;border-radius:8px;
  padding:10px 8px;font-size:11px;font-weight:700;cursor:pointer;text-align:left;line-height:1.3}
button:active{opacity:.7}
button.ok{border-color:#00e096;color:#00e096}
button.err{border-color:#ff4560;color:#ff4560}
button.run{background:#0077aa;color:#fff;border-color:#0077aa;
  grid-column:1/-1;text-align:center;font-size:13px;padding:12px}
#log{background:#0d1720;border:1px solid #1a2d42;border-radius:8px;padding:10px;
  white-space:pre-wrap;word-break:break-all;height:58vh;overflow-y:auto;font-size:11px;line-height:1.6}
.ok{color:#00e096}.err{color:#ff4560}.info{color:#60a5fa}.warn{color:#f0b429}.sep{color:#3d5a78}
</style>
</head>
<body>
<h2>🔧 Debug v13 — CafeF Confirmed</h2>
<div class="sub">CafeF ✅ xác nhận hoạt động. Test xem giá đúng không.</div>
<div class="grid">
  <button id="b1" onclick="t('cafef30')">✅ 1. CafeF ACB<br><span style="opacity:.6;font-weight:400">30 phiên — parse giá</span></button>
  <button id="b2" onclick="t('cafef60')">✅ 2. CafeF ACB×60<br><span style="opacity:.6;font-weight:400">60 phiên — RSI đủ</span></button>
  <button id="b3" onclick="t('cafefVCB')">📊 3. CafeF VCB<br><span style="opacity:.6;font-weight:400">Test mã khác</span></button>
  <button id="b4" onclick="t('cafefSSI')">📊 4. CafeF SSI<br><span style="opacity:.6;font-weight:400">Test CK</span></button>
  <button id="b5" onclick="t('cafefVHM')">📊 5. CafeF VHM<br><span style="opacity:.6;font-weight:400">Test BĐS</span></button>
  <button id="b6" onclick="t('rsi')">🧮 6. RSI/Stoch ACB<br><span style="opacity:.6;font-weight:400">Tính chỉ báo</span></button>
  <button class="run" onclick="runAll()">▶▶ CHẠY TẤT CẢ — Xác nhận v13 hoạt động</button>
</div>
<div id="log">Bấm CHẠY TẤT CẢ...
</div>

<script>
const PROXY = 'https://vnstock.monosake02.workers.dev/?url=';
const el = document.getElementById('log');
function log(msg, cls='') {
  const s = document.createElement('span');
  if(cls) s.className = cls;
  s.textContent = msg + '\n';
  el.appendChild(s); el.scrollTop = el.scrollHeight;
}
function setBtn(id, state) {
  const b = document.getElementById('b'+id);
  if(!b) return;
  b.classList.remove('ok','err');
  if(state) b.classList.add(state);
}

function calcRSI(c, p=14) {
  if(c.length < p+1) return 50;
  let g=0, l=0;
  for(let i=c.length-p; i<c.length; i++) { const d=c[i]-c[i-1]; d>0?g+=d:l+=Math.abs(d); }
  g/=p; l/=p; return l===0?100:100-(100/(1+g/l));
}
function calcStoch(c, h, l, p=14) {
  if(c.length<p) return 50;
  const n=c.length, hh=Math.max(...h.slice(n-p)), ll=Math.min(...l.slice(n-p));
  return hh===ll?50:((c[n-1]-ll)/(hh-ll))*100;
}

async function fetchCafeF(ticker, pageSize=30) {
  const url = `https://s.cafef.vn/Ajax/PageNew/DataHistory/PriceHistory.ashx?Symbol=${ticker}&StartDate=&EndDate=&PageIndex=1&PageSize=${pageSize}`;
  const r = await fetch(PROXY + encodeURIComponent(url));
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  const rows = d?.Data?.Data;
  if(!rows?.length) throw new Error('no data');
  return rows;
}

const TESTS = {
  cafef30: async() => {
    const rows = await fetchCafeF('ACB', 30);
    log('Số phiên: '+rows.length, rows.length>0?'ok':'err');
    const first = rows[0]; // Mới nhất
    log('Phiên mới nhất:', 'info');
    log('  Ngày: '+first.Ngay, 'ok');
    log('  GiaDongCua: '+first.GiaDongCua, 'ok');
    log('  GiaDieuChinh: '+first.GiaDieuChinh, 'ok');
    log('  GiaCaoNhat: '+first.GiaCaoNhat, 'ok');
    log('  GiaThapNhat: '+first.GiaThapNhat, 'ok');
    log('  ThayDoi: '+first.ThayDoi, 'ok');
    log('  KhoiLuongKhopLenh: '+first.KhoiLuongKhopLenh, 'ok');
    // Parse giá
    const price = parseFloat(first.GiaDieuChinh||first.GiaDongCua);
    const priceVND = price >= 1000 ? Math.round(price) : Math.round(price*1000);
    log('→ Giá VNĐ: '+priceVND.toLocaleString('vi-VN')+'đ', 'ok');
  },
  cafef60: async() => {
    const rows = await fetchCafeF('ACB', 60);
    log('Số phiên: '+rows.length, rows.length>=14?'ok':'warn');
    if(rows.length >= 2) {
      const sorted = [...rows].reverse();
      const closes = sorted.map(r => parseFloat(r.GiaDieuChinh||r.GiaDongCua));
      log('RSI(14): '+calcRSI(closes).toFixed(1), 'ok');
      log('Stoch: '+calcStoch(closes,closes,closes).toFixed(1), 'ok');
      log('Đủ dữ liệu cho RSI: '+(closes.length>=15?'✅ Có':'⚠️ Chưa đủ'), closes.length>=15?'ok':'warn');
    }
  },
  cafefVCB: async() => {
    const rows = await fetchCafeF('VCB', 5);
    const f = rows[0];
    const p = parseFloat(f.GiaDieuChinh||f.GiaDongCua);
    const vnd = p >= 1000 ? Math.round(p) : Math.round(p*1000);
    log('VCB ngày '+f.Ngay+': '+vnd.toLocaleString('vi-VN')+'đ', 'ok');
  },
  cafefSSI: async() => {
    const rows = await fetchCafeF('SSI', 5);
    const f = rows[0];
    const p = parseFloat(f.GiaDieuChinh||f.GiaDongCua);
    const vnd = p >= 1000 ? Math.round(p) : Math.round(p*1000);
    log('SSI ngày '+f.Ngay+': '+vnd.toLocaleString('vi-VN')+'đ', 'ok');
  },
  cafefVHM: async() => {
    const rows = await fetchCafeF('VHM', 5);
    const f = rows[0];
    const p = parseFloat(f.GiaDieuChinh||f.GiaDongCua);
    const vnd = p >= 1000 ? Math.round(p) : Math.round(p*1000);
    log('VHM ngày '+f.Ngay+': '+vnd.toLocaleString('vi-VN')+'đ', 'ok');
  },
  rsi: async() => {
    const rows = await fetchCafeF('ACB', 60);
    const sorted = [...rows].reverse();
    const closes = sorted.map(r => parseFloat(r.GiaDieuChinh||r.GiaDongCua));
    const highs  = sorted.map(r => parseFloat(r.GiaCaoNhat||r.GiaDongCua));
    const lows   = sorted.map(r => parseFloat(r.GiaThapNhat||r.GiaDongCua));
    const rsi   = calcRSI(closes);
    const stoch = calcStoch(closes, highs, lows);
    const last = rows[0];
    const p = parseFloat(last.GiaDieuChinh||last.GiaDongCua);
    const vnd = p >= 1000 ? Math.round(p) : Math.round(p*1000);
    log('ACB — '+last.Ngay, 'info');
    log('Giá: '+vnd.toLocaleString('vi-VN')+'đ', 'ok');
    log('RSI(14): '+rsi.toFixed(1)+' → '+(rsi<30?'🔴 QUÁ BÁN':rsi>70?'🔵 QUÁ MUA':'⚪ TRUNG TÍNH'), 'ok');
    log('Stoch%K: '+stoch.toFixed(1), 'ok');
    log('Số phiên dùng tính: '+closes.length, 'ok');
  },
};

const KEYS = [['cafef30',1],['cafef60',2],['cafefVCB',3],['cafefSSI',4],['cafefVHM',5],['rsi',6]];

async function t(name) {
  el.innerHTML='';
  const pair = KEYS.find(k=>k[0]===name);
  log('=== '+name.toUpperCase()+' === '+new Date().toLocaleTimeString('vi-VN'), 'info');
  try {
    await TESTS[name]();
    log('\n✅ PASS', 'ok');
    if(pair) setBtn(pair[1],'ok');
  } catch(e) {
    log('\n❌ '+e.message, 'err');
    if(pair) setBtn(pair[1],'err');
  }
}

async function runAll() {
  el.innerHTML='';
  log('=== CHẠY TẤT CẢ === '+new Date().toLocaleTimeString('vi-VN'), 'info');
  const res = {};
  for(const [name,id] of KEYS) {
    log('\n── '+name+' ──', 'info');
    try {
      await TESTS[name]();
      res[name]='✅'; setBtn(id,'ok'); log('→ PASS','ok');
    } catch(e) {
      res[name]='❌ '+e.message; setBtn(id,'err'); log('→ FAIL: '+e.message,'err');
    }
  }
  log('\n════ KẾT QUẢ ════', 'info');
  let pass=0;
  for(const [k,v] of Object.entries(res)) {
    log(k.padEnd(12)+': '+v, v.startsWith('✅')?'ok':'err');
    if(v.startsWith('✅')) pass++;
  }
  log('\nPASS: '+pass+'/'+KEYS.length, pass>0?'ok':'err');
  if(pass===KEYS.length) log('\n🎉 CafeF hoạt động hoàn hảo! Upload vnstock_v13 là xong!', 'ok');
  else if(pass>0) log('\n⚠️ Một số test lỗi — kiểm tra thêm', 'warn');
  else log('\n❌ CafeF cũng lỗi — Worker cần sửa', 'err');
}
</script>

</body>
</html>
