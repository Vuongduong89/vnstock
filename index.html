<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VN Stocks">
<title>VN Stock Tracker v14</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070c12;--surface:#0d1720;--card:#121d2b;--border:#1a2d42;
  --accent:#00c8ff;--gold:#f0b429;--gold-dim:rgba(240,180,41,.08);
  --red:#ff4560;--red-dim:rgba(255,69,96,.11);
  --green:#00e096;--green-dim:rgba(0,224,150,.11);
  --blue:#2979ff;--blue-dim:rgba(41,121,255,.11);
  --yellow:#ffd740;--muted:#3d5a78;--text:#ddeaf8;--text2:#6a90b0;
  --bank:#38bdf8;--bank-dim:rgba(56,189,248,.09);
  --sec:#a78bfa;--sec-dim:rgba(167,139,250,.09);
  --bds:#34d399;--bds-dim:rgba(52,211,153,.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

header{position:sticky;top:0;z-index:100;background:rgba(7,12,18,.97);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-bottom:1px solid var(–border);padding:10px 14px 8px}
.hdr1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:‘Syne’,sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px}
.logo .vn{color:var(–accent)}.logo .v{color:var(–gold);font-size:10px;vertical-align:super}
.ts{font-size:10px;color:var(–muted);text-align:right;line-height:1.4}

#btn{display:flex;align-items:center;justify-content:center;gap:7px;
background:linear-gradient(135deg,#0077aa,#1a4bcc);
color:#fff;border:none;border-radius:11px;padding:11px 14px;
font-family:‘Syne’,sans-serif;font-weight:700;font-size:13px;
cursor:pointer;width:100%;box-shadow:0 0 22px rgba(0,119,170,.3);transition:opacity .15s}
#btn:active{opacity:.8}#btn.loading{opacity:.6;pointer-events:none}
.spin{display:inline-block;animation:spin .7s linear infinite}

.prog{height:3px;background:var(–border)}
.prog-f{height:100%;background:linear-gradient(90deg,var(–accent),var(–blue));width:0%;transition:width .35s ease}

.sbar{padding:6px 14px;font-size:10px;color:var(–text2);background:var(–surface);
border-bottom:1px solid var(–border);min-height:28px;display:flex;align-items:center;justify-content:space-between}
.live-n{color:var(–green);font-weight:700}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 12px}
.sp{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:9px 6px;text-align:center}
.sp .n{font-family:‘Syne’,sans-serif;font-weight:800;font-size:21px;line-height:1}
.sp .l{font-size:9px;color:var(–text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.sp.red .n{color:var(–red)}.sp.green .n{color:var(–green)}.sp.blue .n{color:var(–blue)}.sp.gold .n{color:var(–gold)}

.filters{padding:0 12px 8px;display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;
border:1px solid var(–border);background:var(–card);color:var(–text2);
cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(–accent);color:var(–bg);border-color:var(–accent);font-weight:700}

.sw{padding:0 12px 8px;position:relative}
.sw input{width:100%;background:var(–card);border:1px solid var(–border);
border-radius:11px;padding:9px 12px 9px 34px;color:var(–text);
font-family:‘DM Mono’,monospace;font-size:13px;outline:none}
.sw input::placeholder{color:var(–muted)}
.sw .ico{position:absolute;left:24px;top:50%;transform:translateY(-50%);
color:var(–muted);font-size:13px;pointer-events:none}

.disc{margin:0 12px 8px;background:var(–gold-dim);border:1px solid rgba(240,180,41,.18);
border-radius:10px;padding:8px 12px;font-size:10px;color:var(–gold);line-height:1.5}

.sec-hdr{padding:4px 14px 5px;font-family:‘Syne’,sans-serif;font-weight:700;
font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(–muted);
display:flex;align-items:center;gap:8px}
.sec-hdr::after{content:’’;flex:1;height:1px;background:var(–border)}

#list{padding:0 10px 90px;display:flex;flex-direction:column;gap:7px}
.card{background:var(–card);border:1px solid var(–border);border-radius:15px;padding:13px;animation:up .2s ease both}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.tk{font-family:‘Syne’,sans-serif;font-weight:800;font-size:15px;color:var(–text);line-height:1}
.cn{font-size:10px;color:var(–text2);margin-top:1px}
.bdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-top:4px}
.bk{color:var(–bank);background:var(–bank-dim)}.bs{color:var(–sec);background:var(–sec-dim)}.bb{color:var(–bds);background:var(–bds-dim)}
.cright{text-align:right}
.price{font-family:‘Syne’,sans-serif;font-weight:700;font-size:15px}
.pct{font-size:11px;margin-top:1px}
.up{color:var(–green)}.dn{color:var(–red)}.fl{color:var(–muted)}
.tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-top:3px;font-weight:600}
.tag-live{color:var(–green);background:var(–green-dim)}
.tag-stat{color:var(–muted);background:rgba(61,90,120,.12)}
.tag-upd{color:var(–yellow);background:rgba(255,215,64,.1);animation:blink .8s infinite}

.inds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.ib{background:var(–surface);border-radius:9px;padding:7px 9px}
.il{font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:.4px}
.iv{font-family:‘Syne’,sans-serif;font-weight:700;font-size:15px;margin-top:2px}
.bar{height:3px;background:var(–border);border-radius:2px;margin-top:4px;overflow:hidden}
.bf{height:100%;border-radius:2px;transition:width .5s ease}

.cbot{display:flex;align-items:center;justify-content:space-between;gap:7px}
.sbadge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;display:flex;align-items:center;gap:3px}
.sos{background:var(–red-dim);color:var(–red);border:1px solid rgba(255,69,96,.22)}
.sob{background:var(–blue-dim);color:var(–blue);border:1px solid rgba(41,121,255,.22)}
.sneu{background:rgba(61,90,120,.12);color:var(–muted);border:1px solid var(–border)}
.rb{font-size:10px;font-weight:700;padding:4px 9px;border-radius:7px}
.rb3{background:var(–green-dim);color:var(–green);border:1px solid rgba(0,224,150,.22)}
.rb2{background:rgba(0,224,150,.06);color:#00b87a;border:1px solid rgba(0,184,122,.18)}
.rw{background:rgba(255,215,64,.09);color:var(–yellow);border:1px solid rgba(255,215,64,.22)}
.rs{background:rgba(255,69,96,.07);color:var(–red);border:1px solid rgba(255,69,96,.18)}
.rs2{background:var(–red-dim);color:var(–red);border:1px solid rgba(255,69,96,.28)}
.cnote{font-size:10px;color:var(–muted);margin-top:7px;padding-top:7px;border-top:1px solid var(–border)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);
background:var(–surface);border:1px solid var(–border);border-radius:11px;
padding:9px 18px;font-size:12px;color:var(–text);z-index:300;opacity:0;
transition:all .22s;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.45);
max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(–green);color:var(–green)}
.toast.warn{border-color:var(–yellow);color:var(–yellow)}
.empty{text-align:center;padding:48px 20px;color:var(–muted)}
</style>

</head>

<div class="toast" id="toast"></div>
<header>
  <div class="hdr1">
    <div class="logo"><span class="vn">VN</span>Stock<span class="v"> v9</span></div>
    <div class="ts" id="ts">Chưa cập nhật<br><span style="color:#3d5a78;font-size:9px">Yahoo · Stooq · KBS · TCBS</span></div>
  </div>
  <button id="btn" onclick="refresh()">
    <span id="bi">🔄</span>
    <span id="bt">CẬP NHẬT GIÁ THỰC</span>
  </button>
</header>
<div class="prog"><div class="prog-f" id="pgf"></div></div>
<div class="sbar">
  <span id="sb">Sẵn sàng — bấm CẬP NHẬT</span>
  <span class="live-n" id="ln"></span>
</div>
<div class="stats">
  <div class="sp red">  <div class="n" id="c-os">—</div><div class="l">Quá bán</div></div>

  <div class="sp blue"> <div class="n" id="c-ob">—</div><div class="l">Quá mua</div></div>
  <div class="sp gold"> <div class="n" id="c-buy">—</div><div class="l">Nên mua</div></div>
</div>
<div class="filters">
  <div id="fs" style="display:flex;gap:4px;flex-wrap:wrap">
    <div class="chip active" data-v="all">Tất cả</div>
    <div class="chip" data-v="Ngân hàng">🏦 NH</div>
    <div class="chip" data-v="Chứng khoán">📈 CK</div>
    <div class="chip" data-v="Bất động sản">🏢 BĐS</div>
  </div>
  <div id="ft" style="display:flex;gap:4px;flex-wrap:wrap">
    <div class="chip active" data-v="all">Mọi TT</div>
    <div class="chip" data-v="os">🔴 Quá bán</div>
    <div class="chip" data-v="ob">🔵 Quá mua</div>
    <div class="chip" data-v="buy">⭐ Nên mua</div>
  </div>
</div>
<div class="sw"><span class="ico">🔍</span><input id="q" type="text" placeholder="Tìm mã... ACB, SSI, VHM..." oninput="render()"></div>
<div class="disc">⚠️ Chỉ tham khảo kỹ thuật · Không phải khuyến nghị đầu tư · Nguồn: Yahoo · Stooq · KBS · TCBS · FireAnt</div>
<div id="list"></div>

let fSec='all',fTT='all',running=false;

function calcRSI(c,p=14){
  if(c.length<p+1)return 50;
  let g=0,l=0;
  for(let i=c.length-p;i<c.length;i++){const d=c[i]-c[i-1];d>0?g+=d:l+=Math.abs(d)}
  g/=p;l/=p;return l===0?100:100-(100/(1+g/l));
}
function calcStoch(c,h,l,p=14){
  if(c.length<p)return 50;
  const n=c.length,hh=Math.max(...h.slice(n-p)),ll=Math.min(...l.slice(n-p));
  return hh===ll?50:((c[n-1]-ll)/(hh-ll))*100;
}
const status=r=>r<30?'os':r>70?'ob':'neu';
function rec(rsi,stoch,fund){
  let s=0;
  if(rsi<30)s+=2;else if(rsi<40)s+=1;
  if(rsi>70)s-=2;else if(rsi>60)s-=1;
  if(stoch<25)s+=2;else if(stoch<35)s+=1;
  if(stoch>75)s-=2;else if(stoch>65)s-=1;
  const f=(fund||'').toLowerCase();
  if(f.includes('tốt'))s+=2;else if(f.includes('khá'))s+=1;else if(f.includes('yếu'))s-=2;
  if(s>=4)return{l:'★★★ MUA MẠNH',c:'rb3'};
  if(s>=2)return{l:'★★ MUA',c:'rb2'};
  if(s>=0)return{l:'◆ THEO DÕI',c:'rw'};
  if(s>=-2)return{l:'✖ BÁN',c:'rs'};
  return{l:'✖✖ BÁN MẠNH',c:'rs2'};
}
const rC=r=>r<30?'var(--green)':r>70?'var(--blue)':r<45?'var(--yellow)':'var(--muted)';
const sC=s=>s<25?'var(--green)':s>75?'var(--blue)':'var(--muted)';
const fC=f=>f.includes('Tốt')?'var(--green)':f.includes('Yếu')?'var(--red)':'var(--yellow)';

// ═══════════════════════════════════════════════
// Proxy: https://vnstock.monosake02.workers.dev/
// Nguồn: CafeF ✅ — giá thực hôm nay
// FIX: rows[0] = ngày mới nhất (không reverse)
// ═══════════════════════════════════════════════
const PROXY = 'https://vnstock.monosake02.workers.dev/?url=';

async function proxied(url) {
  const r = await fetch(PROXY + encodeURIComponent(url));
  if (!r.ok) throw new Error('proxy-' + r.status);
  const txt = await r.text();
  if (!txt || txt.length < 10) throw new Error('empty');
  return JSON.parse(txt);
}

// ── CafeF ✅ CONFIRMED — rows[0] = ngày MỚI NHẤT ──
async function fetchCafeF(ticker, pageSize=60) {
  const url = `https://s.cafef.vn/Ajax/PageNew/DataHistory/PriceHistory.ashx?Symbol=${ticker}&StartDate=&EndDate=&PageIndex=1&PageSize=${pageSize}`;
  const d = await proxied(url);
  const rows = d?.Data?.Data;
  if (!rows?.length) throw new Error('cafef-empty');

  // ✅ FIX: rows[0] = ngày mới nhất, rows[N-1] = cũ nhất
  // KHÔNG reverse — lấy đúng thứ tự để tính RSI/Stoch
  // Parse giá: CafeF đơn vị nghìn đồng (23.75 = 23,750đ)
  const toPrice = v => {
    const n = parseFloat(v);
    return n >= 1000 ? n : n * 1000; // nếu < 1000 → nhân 1000
  };

  // Sắp xếp cũ → mới để tính RSI đúng chiều
  const oldToNew = [...rows].reverse();
  const closes = oldToNew.map(r => toPrice(r.GiaDieuChinh || r.GiaDongCua));
  const highs  = oldToNew.map(r => toPrice(r.GiaCaoNhat   || r.GiaDongCua));
  const lows   = oldToNew.map(r => toPrice(r.GiaThapNhat  || r.GiaDongCua));

  if (closes.length < 2) throw new Error('cafef-nodata');

  // Giá mới nhất = rows[0] (KHÔNG phải oldToNew cuối)
  const newest = rows[0];
  const price  = Math.round(toPrice(newest.GiaDieuChinh || newest.GiaDongCua));
  const prev   = Math.round(toPrice(rows[1]?.GiaDieuChinh || rows[1]?.GiaDongCua || newest.GiaDongCua));

  return {
    price,
    changePct: prev ? +((price - prev) / prev * 100).toFixed(2) : 0,
    rsi:   +calcRSI(closes).toFixed(1),
    stoch: +calcStoch(closes, highs, lows).toFixed(1),
    src:   'CafeF',
    date:  newest.Ngay || ''
  };
}

// Fallback: CafeF với 30 phiên (nhanh hơn)
async function fetchCafeFQuick(ticker) {
  return fetchCafeF(ticker, 30);
}

async function fetchBest(ticker){
  const results=await Promise.allSettled([fetchYahoo(ticker),fetchYahooV7(ticker),fetchStooq(ticker),fetchFireAnt(ticker),fetchKBS(ticker),fetchTCBS(ticker)]);
  for(const r of results)if(r.status==='fulfilled')return r.value;
  throw new Error('all failed');
}

function updateStats(){
  document.getElementById('c-os').textContent=stocks.filter(s=>s.rsi<30).length;
  document.getElementById('c-neu').textContent=stocks.filter(s=>s.rsi>=30&&s.rsi<=70).length;
  document.getElementById('c-ob').textContent=stocks.filter(s=>s.rsi>70).length;
  document.getElementById('c-buy').textContent=stocks.filter(s=>{const r=rec(s.rsi,s.stoch,s.fundamental);return r.c==='rb3'||r.c==='rb2';}).length;
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  let list=stocks.filter(s=>{
    if(fSec!=='all'&&s.sector!==fSec)return false;
    if(fTT==='os'&&status(s.rsi)!=='os')return false;
    if(fTT==='ob'&&status(s.rsi)!=='ob')return false;
    if(fTT==='buy'){const r=rec(s.rsi,s.stoch,s.fundamental);if(r.c!=='rb3'&&r.c!=='rb2')return false;}
    if(q&&!s.ticker.toLowerCase().includes(q)&&!s.name.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>a.rsi-b.rsi);

  updateStats();
  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">🔍 Không tìm thấy</div>';return;}

  let html='',lastSec=null;
  list.forEach((s,i)=>{
    if(s.sector!==lastSec){
      html+=`<div class="sec-hdr">${s.sector} — ${list.filter(x=>x.sector===s.sector).length} mã</div>`;
      lastSec=s.sector;
    }
    const st=status(s.rsi),r=rec(s.rsi,s.stoch,s.fundamental);
    const pc=s.changePct,pCls=pc>0?'up':pc<0?'dn':'fl',pStr=(pc>0?'+':'')+pc.toFixed(2)+'%';
    const stB=st==='os'?`<span class="sbadge sos">🔴 QUÁ BÁN</span>`:st==='ob'?`<span class="sbadge sob">🔵 QUÁ MUA</span>`:`<span class="sbadge sneu">⚪ TRUNG TÍNH</span>`;
    const bdg=s.sector==='Ngân hàng'?'<span class="bdg bk">🏦 NH</span>':s.sector==='Chứng khoán'?'<span class="bdg bs">📈 CK</span>':'<span class="bdg bb">🏢 BĐS</span>';
    const lTag=s.upd?'<span class="tag tag-upd">⟳ tải</span>':s.live?`<span class="tag tag-live">● ${s.src}${s.date?' '+s.date.slice(0,5):''}</span>`:'<span class="tag tag-stat">📋 17/03</span>';
    html+=`<div class="card" style="animation-delay:${i*.012}s">
<div class="ctop">
  <div>${bdg}<div class="tk" style="margin-top:3px">${s.ticker}</div><div class="cn">${s.name}</div></div>
  <div class="cright"><div class="price">${s.price.toLocaleString('vi-VN')}₫</div><div class="pct ${pCls}">${pStr}</div>${lTag}</div>
</div>
<div class="inds">
  <div class="ib"><div class="il">RSI 14</div><div class="iv" style="color:${rC(s.rsi)}">${s.rsi.toFixed(1)}</div><div class="bar"><div class="bf" style="width:${Math.min(s.rsi,100)}%;background:${rC(s.rsi)}"></div></div></div>
  <div class="ib"><div class="il">Stoch%K</div><div class="iv" style="color:${sC(s.stoch)}">${s.stoch.toFixed(1)}</div><div class="bar"><div class="bf" style="width:${Math.min(s.stoch,100)}%;background:${sC(s.stoch)}"></div></div></div>
  <div class="ib"><div class="il">Cơ bản</div><div class="iv" style="font-size:12px;color:${fC(s.fundamental)}">${s.fundamental}</div></div>
</div>
<div class="cbot">${stB}<span class="rb ${r.c}">${r.l}</span></div>
<div class="cnote">${s.note}</div>
</div>`;
  });
  el.innerHTML=html;
}

async function refresh(){
  if(running)return;running=true;
  const btn=document.getElementById('btn'),bi=document.getElementById('bi'),bt=document.getElementById('bt');
  btn.classList.add('loading');
  bi.innerHTML='<span class="spin">⟳</span>';bt.textContent='ĐANG TẢI...';
  let liveN=0,errN=0;
  const srcCnt={};
  const BATCH=6;
  for(let i=0;i<stocks.length;i+=BATCH){
    const batch=stocks.slice(i,i+BATCH);
    batch.forEach(s=>s.upd=true);render();
    document.getElementById('pgf').style.width=Math.round(i/stocks.length*100)+'%';
    document.getElementById('sb').textContent=`Lô ${Math.floor(i/BATCH)+1}/${Math.ceil(stocks.length/BATCH)}: ${batch.map(s=>s.ticker).join(' · ')}`;
    document.getElementById('ln').textContent=liveN>0?`✓${liveN} live`:'';
    await Promise.all(batch.map(async s=>{
      try{
        const d=await fetchBest(s.ticker);
        Object.assign(s,d,{live:true,upd:false});
        liveN++;
        srcCnt[d.src]=(srcCnt[d.src]||0)+1;
      }catch{s.upd=false;errN++;}
    }));
    render();
    if(i+BATCH<stocks.length)await new Promise(r=>setTimeout(r,300));
  }
  document.getElementById('pgf').style.width='100%';
  setTimeout(()=>document.getElementById('pgf').style.width='0%',1200);
  running=false;btn.classList.remove('loading');
  const srcStr=Object.entries(srcCnt).map(([k,v])=>`${k}:${v}`).join(' · ');
  bi.textContent=liveN>0?'✅':'⚠️';
  bt.textContent=`${liveN}/${stocks.length} LIVE`;
  setTimeout(()=>{bi.textContent='🔄';bt.textContent='CẬP NHẬT GIÁ THỰC';},5000);
  const now=new Date();
  document.getElementById('ts').textContent=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} · ${liveN}/${stocks.length} live\n${srcStr}`;
  document.getElementById('sb').textContent=`✅ ${liveN} live · ${errN} tĩnh · ${srcStr}`;
  document.getElementById('ln').textContent=liveN>0?`✓${liveN} live`:'';
  if(liveN>0)toast(`✅ ${liveN}/${stocks.length} mã live — ${srcStr}`,'ok');
  else toast('⚠️ Không lấy được giá — kiểm tra kết nối mạng','warn');
}
